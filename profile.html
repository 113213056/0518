<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人首頁 - 🏀 NBA 分享交流平台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand" onclick="go('index')">
    <span style="font-size:26px">🏀</span>
    <span>NBA 交流平台</span>
  </div>
  <div class="navbar-nav" id="navArea"></div>
</nav>

<div class="page" style="display:block;">
  <div class="wrap">
    <div class="card">
      <div class="prof-head">
        <img class="prof-av" id="profAv" src="">
        <div class="prof-info">
          <h2 id="profNm"></h2>
          <p id="profIdTxt"></p>
        </div>
      </div>
      <div class="new-trigger" onclick="go('create')">
        <img id="trigAv" src="">
        <span>分享你對 NBA 的看法...</span>
        <span style="font-size:18px">✏️</span>
      </div>
    </div>
    <div class="sec-title">📝 我的貼文</div>
    <div id="myPosts"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="mi">🔒</div>
    <h3>是否有平台帳號？</h3>
    <p>登入後即可按讚、留言，和大家一起互動！</p>
    <div class="modal-btns">
      <button class="btn btn-p" style="width:auto;padding:10px 24px" onclick="closeModal();go('login')">前往登入</button>
      <button class="btn btn-o" onclick="closeModal();go('register')">註冊帳號</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
