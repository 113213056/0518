<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立新貼文 - 🏀 NBA 分享交流平台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand" onclick="go('index')">
    <span style="font-size:26px">🏀</span>
    <span>NBA 交流平台</span>
  </div>
  <div class="navbar-nav" id="navArea"></div>
</nav>

<div class="page" style="display:block;">
  <div class="wrap">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
        <h2 style="font-size:18px">📝 建立新貼文</h2>
        <button class="btn btn-o" onclick="go('profile')">✕ 取消</button>
      </div>
      <div class="cp-head">
        <img id="cpAv" src="">
        <div><div class="n" id="cpNm"></div><div class="i" id="cpId"></div></div>
      </div>
      <div class="fg">
        <label>📌 貼文主題</label>
        <input type="text" id="cpTitle" placeholder="例如：LeBron 今晚大三元！">
      </div>
      <div class="fg">
        <label>📄 貼文內容</label>
        <textarea id="cpContent" placeholder="分享你的想法、分析、討論..."></textarea>
      </div>
      <label style="font-size:13px;font-weight:600">🖼️ 上傳圖片（選填）</label>
      <div class="img-prev" id="cpImgPrev">
        <img id="cpImgTag" src="">
        <button class="rm" onclick="rmCpImg()">✕</button>
      </div>
      <div class="img-up" id="cpImgUp" onclick="$('cpImgIn').click()">
        <div style="font-size:28px">📸</div>
        <div style="color:var(--text2);font-size:13px">點擊上傳照片</div>
        <input type="file" id="cpImgIn" accept="image/*" onchange="prevCpImg(event)">
      </div>
      <button class="btn btn-a" style="width:100%;margin-top:12px" onclick="doPost()">🚀 發布貼文</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="mi">🔒</div>
    <h3>是否有平台帳號？</h3>
    <p>登入後即可按讚、留言，和大家一起互動！</p>
    <div class="modal-btns">
      <button class="btn btn-p" style="width:auto;padding:10px 24px" onclick="closeModal();go('login')">前往登入</button>
      <button class="btn btn-o" onclick="closeModal();go('register')">註冊帳號</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
