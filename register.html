<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>註冊 - 🏀 NBA 分享交流平台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand" onclick="go('index')">
    <span style="font-size:26px">🏀</span>
    <span>NBA 交流平台</span>
  </div>
  <div class="navbar-nav" id="navArea"></div>
</nav>

<div class="page auth-wrap" style="display:flex;">
  <div class="auth-box">
    <h2>🏀 加入我們</h2>
    <p class="sub">建立帳號，開始分享你的 NBA 觀點</p>
    <div class="fg">
      <label>上傳頭貼</label>
      <div class="avatar-upload">
        <div class="avatar-circle" id="regAvPrev" onclick="$('regAvIn').click()">📷</div>
        <input type="file" id="regAvIn" accept="image/*" onchange="prevAv(event,'regAvPrev')">
        <span class="avatar-label" onclick="$('regAvIn').click()">點擊上傳照片</span>
      </div>
    </div>
    <div class="fg">
      <label>帳號 ID <span style="color:var(--text3);font-weight:400;font-size:11px">（登入用，不可重複）</span></label>
      <input type="text" id="regId" placeholder="例如：kobe24">
    </div>
    <div class="fg">
      <label>顯示名稱</label>
      <input type="text" id="regNm" placeholder="例如：黑曼巴">
    </div>
    <div class="fg">
      <label>密碼</label>
      <input type="password" id="regPw" placeholder="至少 4 碼">
    </div>
    <button class="btn btn-p" onclick="doRegister()" style="margin-top:6px">✨ 註冊帳號</button>
    <p class="switch">已有帳號？<a onclick="go('login')">返回登入</a></p>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="mi">🔒</div>
    <h3>是否有平台帳號？</h3>
    <p>登入後即可按讚、留言，和大家一起互動！</p>
    <div class="modal-btns">
      <button class="btn btn-p" style="width:auto;padding:10px 24px" onclick="closeModal();go('login')">前往登入</button>
      <button class="btn btn-o" onclick="closeModal();go('register')">註冊帳號</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
